services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: happy_calendar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d happy_calendar"]
      interval: 10s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    env_file: .env.prod       # all secrets — never committed to git
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    # Runs pending migrations on every deploy, then starts the server.
    # Safe: prisma migrate deploy is idempotent (skips already-applied migrations).
    command: sh -c "npx prisma migrate deploy && node dist/main.js"

volumes:
  postgres_data:
