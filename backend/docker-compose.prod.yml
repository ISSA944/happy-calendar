services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: happy_calendar
    # Performance tuning for 2GB RAM VPS
    command: >
      postgres
      -c shared_buffers=256MB
      -c max_connections=100
      -c effective_cache_size=512MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c log_min_duration_statement=1000
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d happy_calendar"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build: .
    restart: unless-stopped
    env_file: .env.prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"
    # Runs pending migrations on every deploy, then starts the server.
    # Safe: prisma migrate deploy is idempotent (skips already-applied migrations).
    command: sh -c "npx prisma migrate deploy && node dist/main.js"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
